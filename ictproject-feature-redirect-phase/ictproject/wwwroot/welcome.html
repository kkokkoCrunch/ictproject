<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      text-align: center;
      padding: 24px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 12px;
    }

    p {
      font-size: 18px;
      margin-bottom: 24px;
      opacity: 0.9;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/images/welcome-singapore.png" alt="Welcome to Singapore" />
  </div>
</body>
</html>
